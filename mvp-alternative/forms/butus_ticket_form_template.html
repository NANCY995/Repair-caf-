<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUTUS Repair — Formulaire Ticket</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; color: #444; }
    input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; transition: border 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #2ecc71; }
    textarea { min-height: 100px; resize: vertical; }
    .btn { background: #2ecc71; color: white; border: none; padding: 14px 28px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; }
    .btn:hover { background: #27ae60; }
    .status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .status-ouvert { background: #e8f5e9; color: #2e7d32; }
    .status-en_cours { background: #fff3e0; color: #e65100; }
    .status-resolu { background: #e3f2fd; color: #1565c0; }
    .footer { text-align: center; margin-top: 20px; color: #999; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 BUTUS Repair</h1>
    <p class="subtitle">Formulaire de ticket de réparation — À remplir par le réparateur</p>

    <form id="ticketForm">
      <div class="form-group">
        <label>👤 Nom du client</label>
        <input type="text" id="clientName" placeholder="Prénom et nom" required>
      </div>

      <div class="form-group">
        <label>📞 Téléphone du client</label>
        <input type="tel" id="clientPhone" placeholder="+228 XX XX XX XX" required>
      </div>

      <div class="form-group">
        <label>🔧 Type d'appareil</label>
        <select id="deviceType" required>
          <option value="">Sélectionnez...</option>
          <option>Ventilateur</option>
          <option>Climatiseur</option>
          <option>Réfrigérateur / Congélateur</option>
          <option>Machine à laver</option>
          <option>Téléviseur / Écran</option>
          <option>Smartphone / Tablette</option>
          <option>Ordinateur / Laptop</option>
          <option>Sonorisation / Audio</option>
          <option>Petit électroménager</option>
          <option>Groupe électrogène</option>
          <option>Panneau solaire</option>
          <option>Autre</option>
        </select>
      </div>

      <div class="form-group">
        <label>🏷️ Marque</label>
        <input type="text" id="deviceBrand" placeholder="Samsung, Philips, LG..." required>
      </div>

      <div class="form-group">
        <label>📦 Modèle</label>
        <input type="text" id="deviceModel" placeholder="Modèle exact ou 'Inconnu'">
      </div>

      <div class="form-group">
        <label>🔴 Description de la panne</label>
        <textarea id="issueDescription" placeholder="Décrivez le problème en détail..." required></textarea>
      </div>

      <div class="form-group">
        <label>📝 Diagnostic / Notes</label>
        <textarea id="diagnosticNotes" placeholder="Observations du réparateur, pièces nécessaires..."></textarea>
      </div>

      <div class="form-group">
        <label>📌 Statut</label>
        <select id="status">
          <option value="ouvert">🟢 Ouvert</option>
          <option value="en_cours">🟡 En cours</option>
          <option value="resolu">✅ Résolu</option>
          <option value="ferme">⚪ Fermé</option>
        </select>
      </div>

      <div class="form-group">
        <label>💰 Coût estimé (FCFA)</label>
        <input type="number" id="estimatedCost" placeholder="0" min="0">
      </div>

      <button type="submit" class="btn">✅ Créer le ticket</button>
    </form>

    <div id="confirmation" style="display:none; margin-top: 24px; padding: 20px; background: #e8f5e9; border-radius: 8px; text-align: center;">
      <p style="font-size: 18px; font-weight: 600; color: #2e7d32;">✅ Ticket créé !</p>
      <p id="ticketIdDisplay" style="color: #555; margin-top: 8px;"></p>
    </div>

    <p class="footer">BUTUS Repair 🇹🇬 — Lomé, Togo</p>
  </div>

  <script>
    document.getElementById('ticketForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const data = {
        client_name: document.getElementById('clientName').value,
        client_phone: document.getElementById('clientPhone').value,
        device_type: document.getElementById('deviceType').value,
        device_brand: document.getElementById('deviceBrand').value,
        device_model: document.getElementById('deviceModel').value,
        issue_description: document.getElementById('issueDescription').value,
        diagnostic_notes: document.getElementById('diagnosticNotes').value,
        status: document.getElementById('status').value,
        estimated_cost: document.getElementById('estimatedCost').value || '0',
      };

      const ticketId = 'BUTUS-' + Date.now();

      // En mode MVP, on copie dans le presse-papier + redirection Google Form
      const formData = new URLSearchParams();
      formData.append('entry.123456', ticketId);
      formData.append('entry.789012', data.client_name);
      formData.append('entry.345678', data.client_phone);
      formData.append('entry.901234', data.device_type);
      formData.append('entry.567890', data.device_brand);
      formData.append('entry.123789', data.device_model);
      formData.append('entry.456123', data.issue_description);
      formData.append('entry.789456', data.diagnostic_notes);
      formData.append('entry.123456', data.status);

      document.getElementById('ticketForm').style.display = 'none';
      document.getElementById('confirmation').style.display = 'block';
      document.getElementById('ticketIdDisplay').textContent =
        `Ticket : ${ticketId} | Client : ${data.client_name} | ${data.device_type}`;

      // Option : rediriger vers Google Form pré-rempli
      // window.open(`https://docs.google.com/forms/d/e/VOTRE_FORM_ID/viewform?${formData.toString()}`, '_blank');
    });
  </script>
</body>
</html>
