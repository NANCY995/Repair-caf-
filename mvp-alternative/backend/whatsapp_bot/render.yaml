services:
  - type: web
    name: butus-whatsapp-bot
    runtime: python
    repo: https://github.com/NANCY995/Repair-caf-
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: ADMIN_API_TOKEN
        sync: false
      - key: APP_SECRET_KEY
        sync: false
      - key: BUTUS_NOTIFICATION_PHONE
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_SHEETS_SPREADSHEET_ID
        sync: false
