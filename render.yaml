services:
  - type: web
    name: butus-whatsapp-bot
    runtime: python
    plan: free
    region: frankfurt
    rootDir: mvp-alternative/backend/whatsapp_bot
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: AI_PROVIDER
        value: gemini
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: ADMIN_API_TOKEN
        sync: false
      - key: BUTUS_NOTIFICATION_PHONE
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_SHEETS_SPREADSHEET_ID
        sync: false
